# Database Configuration
spring.datasource.url=jdbc:mysql://${DATABASE_HOST:mysql-db}:3306/cab_database_springboot?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Schema Persistence Configuration (Prevents wiping existing data)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Web Server & Host Binding Configuration
server.address=0.0.0.0
server.port=2426

# Logging
logging.file.name=logs/app.log